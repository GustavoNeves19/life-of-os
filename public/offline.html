<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life OS offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(139, 92, 246, 0.12), transparent 35%),
          linear-gradient(180deg, #fafafa 0%, #f4f4f5 100%);
        color: #18181b;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        padding: 32px 24px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 20px 60px rgba(24, 24, 27, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #52525b;
      }

      a {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 18px;
        border-radius: 999px;
        background: #18181b;
        color: #fafafa;
        text-decoration: none;
        font-weight: 600;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background:
            radial-gradient(circle at top, rgba(139, 92, 246, 0.18), transparent 35%),
            linear-gradient(180deg, #09090b 0%, #18181b 100%);
          color: #fafafa;
        }

        main {
          background: rgba(24, 24, 27, 0.88);
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        p {
          color: #d4d4d8;
        }

        a {
          background: #fafafa;
          color: #18181b;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sem conexao agora</h1>
      <p>O Life OS nao conseguiu carregar esta tela no momento. Assim que a internet voltar, recarregue para continuar.</p>
      <a href="/dashboard">Tentar novamente</a>
    </main>
  </body>
</html>
